<script type="module">
    // ----- FIREBASE REALTIME DATABASE CONFIGURATION -----
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-analytics.js";
    import { 
        getDatabase, 
        ref, 
        push, 
        set, 
        onValue, 
        remove, 
        update,
        get
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDSmPnz4mt8YWDXLsoB_zsZS0Fg2ek_yFA",
        authDomain: "zeba-noor-boutique.firebaseapp.com",
        projectId: "zeba-noor-boutique",
        storageBucket: "zeba-noor-boutique.firebasestorage.app",
        messagingSenderId: "268870398012",
        appId: "1:268870398012:web:ecd7ba6e1f9029eda11339",
        measurementId: "G-0Y3L25E75V",
        databaseURL: "https://zeba-noor-boutique-default-rtdb.firebaseio.com" // Your Realtime Database URL
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getDatabase(app);

    // ----- Toast Notification -----
    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = `toast ${type} show`;
        setTimeout(() => {
            toast.classList.remove('show');
        }, 3000);
    }

    // ----- Data Store -----
    let designs = [];
    let isAdminLoggedIn = false;
    let isLoading = false;

    // ----- DOM Elements -----
    const splashEl = document.getElementById('splashScreen');
    const mainApp = document.getElementById('mainApp');
    const customerGrid = document.getElementById('customerDesigns');
    const adminDesignList = document.getElementById('adminDesignList');
    const adminLoginBox = document.getElementById('adminLoginBox');
    const adminPanel = document.getElementById('adminPanel');
    const adminPassInput = document.getElementById('adminPassword');
    const loginBtn = document.getElementById('adminLoginBtn');
    const uploadGrid = document.getElementById('uploadGrid');
    const uploadBtn = document.getElementById('uploadDesignsBtn');
    const progressBar = document.getElementById('progressBar');
    const progressContainer = document.getElementById('uploadProgress');
    const tabBtns = document.querySelectorAll('.tab-btn');

    // ----- Splash Screen -----
    setTimeout(() => {
        splashEl.classList.add('hide-splash');
        mainApp.classList.add('active');
        loadDesignsFromDatabase();
    }, 6000);

    // ----- Tab Switching -----
    const panes = {
        customer: document.getElementById('customerTab'),
        admin: document.getElementById('adminTab')
    };

    tabBtns.forEach(btn => {
        btn.addEventListener('click', function() {
            const tabId = this.dataset.tab;
            tabBtns.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            Object.values(panes).forEach(p => p.classList.remove('active'));
            if (tabId === 'customerTab') {
                panes.customer.classList.add('active');
                loadDesignsFromDatabase();
            } else if (tabId === 'adminTab') {
                panes.admin.classList.add('active');
                if (isAdminLoggedIn) {
                    adminLoginBox.style.display = 'none';
                    adminPanel.style.display = 'block';
                    if (uploadGrid.children.length === 0) generateUploadRows();
                    loadDesignsFromDatabase();
                } else {
                    adminLoginBox.style.display = 'flex';
                    adminPanel.style.display = 'none';
                }
            }
        });
    });

    // ----- Admin Login -----
    loginBtn.addEventListener('click', function() {
        const password = adminPassInput.value.trim();
        if (password === 'zeba1122') {
            isAdminLoggedIn = true;
            adminLoginBox.style.display = 'none';
            adminPanel.style.display = 'block';
            if (uploadGrid.children.length === 0) generateUploadRows();
            loadDesignsFromDatabase();
            showToast('✅ Admin access granted!', 'success');
        } else {
            showToast('❌ Incorrect password.', 'error');
            adminPassInput.value = '';
            adminPassInput.focus();
        }
    });

    // ----- Generate Upload Rows -----
    function generateUploadRows() {
        uploadGrid.innerHTML = '';
        for (let i = 0; i < 10; i++) {
            const row = document.createElement('div');
            row.className = 'upload-row';
            row.innerHTML = `
                <input type="file" accept="image/*" class="file-input" data-index="${i}">
                <input type="text" placeholder="Title" class="title-input" data-index="${i}">
                <input type="text" placeholder="Price (e.g. 5,995)" class="price-input" data-index="${i}">
                <input type="text" placeholder="Cloth (e.g. Cotton)" class="cloth-input" data-index="${i}">
            `;
            uploadGrid.appendChild(row);
        }
    }

    // ----- COMPRESS IMAGE -----
    function compressImage(file, maxSizeKB = 150) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    let quality = 0.8;
                    let width = img.width;
                    let height = img.height;
                    
                    const maxDim = 500;
                    if (width > maxDim) {
                        height = (height * maxDim) / width;
                        width = maxDim;
                    }
                    if (height > maxDim) {
                        width = (width * maxDim) / height;
                        height = maxDim;
                    }
                    
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    let dataUrl = canvas.toDataURL('image/jpeg', quality);
                    let sizeInKB = (dataUrl.length * 3/4) / 1024;
                    
                    let attempts = 0;
                    while (sizeInKB > maxSizeKB && attempts < 10 && quality > 0.1) {
                        quality -= 0.05;
                        dataUrl = canvas.toDataURL('image/jpeg', quality);
                        sizeInKB = (dataUrl.length * 3/4) / 1024;
                        attempts++;
                    }
                    
                    console.log(`Image compressed: ${sizeInKB.toFixed(0)}KB`);
                    resolve(dataUrl);
                };
                img.onerror = reject;
                img.src = e.target.result;
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    // ----- LOAD DESIGNS FROM REALTIME DATABASE -----
    function loadDesignsFromDatabase() {
        if (isLoading) return;
        isLoading = true;
        
        const designsRef = ref(db, 'designs');
        
        onValue(designsRef, (snapshot) => {
            const data = snapshot.val();
            designs = [];
            
            if (data) {
                // Convert object to array with IDs
                designs = Object.keys(data).map(key => ({
                    id: key,
                    ...data[key]
                }));
                
                // Sort by createdAt (newest first)
                designs.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
            }
            
            console.log(`Loaded ${designs.length} designs from Realtime Database`);
            renderCustomerGrid();
            renderAdminDesignList();
            isLoading = false;
        }, (error) => {
            console.error('Error loading designs:', error);
            showToast('❌ Failed to load designs: ' + error.message, 'error');
            customerGrid.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i> Error: ${error.message}</div>`;
            isLoading = false;
        });
    }

    // ----- UPLOAD DESIGNS TO REALTIME DATABASE -----
    uploadBtn.addEventListener('click', async function() {
        const rows = uploadGrid.querySelectorAll('.upload-row');
        let uploadPromises = [];
        let hasFile = false;
        let totalFiles = 0;
        let completedFiles = 0;

        rows.forEach((row) => {
            const fileInput = row.querySelector('.file-input');
            if (fileInput.files[0]) {
                totalFiles++;
                hasFile = true;
            }
        });

        if (!hasFile) {
            showToast('Please select at least one image.', 'error');
            return;
        }

        progressContainer.classList.add('show');
        progressBar.style.width = '0%';

        uploadBtn.disabled = true;
        uploadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Compressing & Uploading...';

        rows.forEach((row) => {
            const fileInput = row.querySelector('.file-input');
            const titleInput = row.querySelector('.title-input');
            const priceInput = row.querySelector('.price-input');
            const clothInput = row.querySelector('.cloth-input');
            const file = fileInput.files[0];
            
            if (file) {
                const promise = (async () => {
                    try {
                        const compressedImage = await compressImage(file, 150);
                        
                        const designData = {
                            title: titleInput.value.trim() || '3-PIECE EMBROIDERED',
                            price: priceInput.value.trim() || '5,995',
                            cloth: clothInput.value.trim() || 'Cotton',
                            image_url: compressedImage,
                            createdAt: Date.now()
                        };
                        
                        // Push to Realtime Database
                        const designsRef = ref(db, 'designs');
                        const newDesignRef = push(designsRef);
                        await set(newDesignRef, designData);
                        
                        completedFiles++;
                        const progress = (completedFiles / totalFiles) * 100;
                        progressBar.style.width = `${progress}%`;
                        
                        return { success: true };
                    } catch (error) {
                        console.error('Upload error:', error);
                        return { success: false, error: error.message };
                    }
                })();
                uploadPromises.push(promise);
            }
        });

        const results = await Promise.all(uploadPromises);
        const successCount = results.filter(r => r.success).length;
        
        uploadBtn.disabled = false;
        uploadBtn.innerHTML = '<i class="fas fa-save"></i> Upload all to database';

        setTimeout(() => {
            progressContainer.classList.remove('show');
            progressBar.style.width = '0%';
        }, 2000);

        if (successCount > 0) {
            showToast(`✅ ${successCount} design(s) uploaded successfully!`, 'success');
            rows.forEach(r => {
                r.querySelector('.file-input').value = '';
                r.querySelector('.title-input').value = '';
                r.querySelector('.price-input').value = '';
                r.querySelector('.cloth-input').value = '';
            });
            // Data will reload automatically via onValue listener
        } else {
            showToast('❌ Upload failed. Check console for errors.', 'error');
        }
    });

    // ----- Render Customer Grid -----
    function renderCustomerGrid() {
        customerGrid.innerHTML = '';
        if (!designs || designs.length === 0) {
            customerGrid.innerHTML = `<div class="empty-state"><i class="fas fa-embroidery"></i> No designs available. Admin will upload soon.</div>`;
            return;
        }

        designs.forEach((d) => {
            const card = document.createElement('div');
            card.className = 'design-card';
            const imgSrc = d.image_url || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%23f0ebe7%22/%3E%3Ctext x=%2220%22 y=%22120%22 font-size=%2230%22 fill=%22%23947766%22%3E🌿%3C/text%3E%3C/svg%3E';
            const price = d.price || '5,995';
            const originalPrice = Math.round(parseInt(price.replace(/,/g,'')) * 2);
            const formattedOriginal = originalPrice.toLocaleString();
            const titleText = d.title || '3-PIECE EMBROIDERED';
            
            card.innerHTML = `
                <img src="${imgSrc}" alt="design" loading="lazy">
                <div class="design-info">
                    <div class="title">
                        <span>${titleText}</span>
                        <span class="badge">READY TO WEAR</span>
                    </div>
                    <div class="price-row">
                        <span class="current">RS. ${price}</span>
                        <span class="original">RS. ${formattedOriginal}</span>
                        <span class="save">SAVE 50%</span>
                    </div>
                    <span class="cloth-tag"><i class="fas fa-tshirt"></i> ${d.cloth || 'Cotton'}</span>
                </div>
                <div class="action-buttons">
                    <a href="#" class="whatsapp" data-wa="+923463023211"><i class="fab fa-whatsapp"></i> WhatsApp</a>
                    <a href="#" class="instagram" data-ig="https://www.instagram.com/zeba_noor_boutique?igsh=MXR3NHlqdXVnNDk3Mg=="><i class="fab fa-instagram"></i> Instagram</a>
                </div>
            `;
            customerGrid.appendChild(card);

            card.querySelector('.whatsapp').addEventListener('click', (e) => {
                e.preventDefault();
                window.open(`https://wa.me/${e.currentTarget.dataset.wa}`, '_blank');
            });
            card.querySelector('.instagram').addEventListener('click', (e) => {
                e.preventDefault();
                window.open(e.currentTarget.dataset.ig, '_blank');
            });
        });
    }

    // ----- Render Admin Design List -----
    function renderAdminDesignList() {
        adminDesignList.innerHTML = '';
        if (!designs || designs.length === 0) {
            adminDesignList.innerHTML = `<div style="padding:20px;text-align:center;color:#8f786a;font-size:0.85rem;">No designs uploaded yet.</div>`;
            return;
        }

        designs.forEach((d) => {
            const item = document.createElement('div');
            item.className = 'admin-design-item';
            item.dataset.id = d.id;
            const imgSrc = d.image_url || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%23f0ebe7%22/%3E%3Ctext x=%2220%22 y=%22120%22 font-size=%2230%22 fill=%22%23947766%22%3E🌿%3C/text%3E%3C/svg%3E';
            
            item.innerHTML = `
                <img src="${imgSrc}" alt="design" loading="lazy">
                <div class="info">
                    <div class="title-text">${d.title || '3-PIECE EMBROIDERED'}</div>
                    <div class="price">RS. ${d.price || '5,995'}</div>
                    <div class="cloth">${d.cloth || 'Cotton'}</div>
                </div>
                <div class="actions">
                    <button class="edit-btn" data-id="${d.id}"><i class="fas fa-edit"></i> Edit</button>
                    <button class="delete-btn" data-id="${d.id}"><i class="fas fa-trash"></i> Del</button>
                </div>
            `;
            adminDesignList.appendChild(item);

            // Delete from Realtime Database
            item.querySelector('.delete-btn').addEventListener('click', async function() {
                const id = this.dataset.id;
                if (confirm('Are you sure you want to delete this design?')) {
                    try {
                        await remove(ref(db, `designs/${id}`));
                        showToast('✅ Design deleted successfully!', 'success');
                        // Data will reload automatically via onValue listener
                    } catch (error) {
                        console.error('Delete error:', error);
                        showToast('❌ Delete failed: ' + error.message, 'error');
                    }
                }
            });

            // Edit in Realtime Database
            item.querySelector('.edit-btn').addEventListener('click', async function() {
                const id = this.dataset.id;
                const design = designs.find(d => d.id === id);
                if (!design) return;
                
                const newTitle = prompt('Edit Title:', design.title || '3-PIECE EMBROIDERED');
                const newPrice = prompt('Edit Price:', design.price);
                const newCloth = prompt('Edit Cloth type:', design.cloth);
                
                if (newTitle !== null || newPrice !== null || newCloth !== null) {
                    const updateData = {};
                    if (newTitle !== null) updateData.title = newTitle.trim() || design.title;
                    if (newPrice !== null) updateData.price = newPrice.trim() || design.price;
                    if (newCloth !== null) updateData.cloth = newCloth.trim() || design.cloth;
                    
                    try {
                        await update(ref(db, `designs/${id}`), updateData);
                        showToast('✅ Design updated successfully!', 'success');
                        // Data will reload automatically via onValue listener
                    } catch (error) {
                        console.error('Update error:', error);
                        showToast('❌ Update failed: ' + error.message, 'error');
                    }
                }
            });
        });
    }

    // ----- Auto-generate upload rows on admin unlock -----
    loginBtn.addEventListener('click', function() {
        if (adminPassInput.value.trim() === 'zeba1122') {
            setTimeout(() => {
                if (uploadGrid.children.length === 0) generateUploadRows();
            }, 50);
        }
    });
</script>
